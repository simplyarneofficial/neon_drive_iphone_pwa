<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON DRIVE</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</head>

<body>
<div class="bg"></div>

<div class="grid">

  <div class="panel">
    <div class="title">SYSTEM</div>
    <div class="item">GPS: <span id="gps">aktiv</span></div>
    <div class="item">Akku: <span id="battery">--</span></div>
    <div class="item">Kompass: <span id="compass">--</span></div>
  </div>

  <div class="center">
    <div class="ring">
      <div id="speed">0</div>
      <div class="unit">km/h</div>
    </div>

    <div id="time"></div>
    <div id="date"></div>
  </div>

  <div class="panel">
    <div class="title">STATUS</div>
    <div class="item">Online Dashboard</div>
    <div class="item">Neon Drive OS</div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
